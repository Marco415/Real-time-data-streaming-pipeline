version: "3.8"

services:

  # ---------------- ZOOKEEPER ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  # ---------------- KAFKA ----------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ---------------- FLINK ----------------
  jobmanager:
    image: flink-ml:1.17
    container_name: flink-jobmanager
    volumes:
      - ./flink_job.py:/opt/flink/flink_job.py
      - ./model.pkl:/opt/flink/model.pkl
      - ./flink-lib/flink-sql-connector-kafka-1.17.0.jar:/opt/flink/lib/flink-sql-connector-kafka.jar
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager


  taskmanager:
    image: flink-ml:1.17
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    volumes:
      - ./flink_job.py:/opt/flink/flink_job.py
      - ./model.pkl:/opt/flink/model.pkl
      - ./flink-lib/flink-sql-connector-kafka-1.17.0.jar:/opt/flink/lib/flink-sql-connector-kafka.jar
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2

  # ---------------- CASSANDRA ----------------
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "TestCluster"
      CASSANDRA_NUM_TOKENS: 1
    volumes:
      - ./schema:/schema
    healthcheck:
        test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
        interval: 15s
        timeout: 10s
        retries: 10
   
  # ---------------- TRINO ----------------
  trino:
    image: trinodb/trino:latest
    depends_on:
      cassandra:
        condition: service_healthy
    ports:
      - "8082:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./config.properties:/etc/trino/config.properties
      - ./node.properties:/etc/trino/node.properties
      - ./jvm.config:/etc/trino/jvm.config
  
  # ---------------- APACHE SUPERSET ----------------
  superset:
    image: apache/superset:4.0.0
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "secret"
    volumes:
      - superset_home:/app/superset_home
    restart: unless-stopped
    command: >
      /bin/bash -c "superset run -h 0.0.0.0 -p 8088"

volumes:
  superset_home: